<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#E6EEF5"/>
    </linearGradient>
    <linearGradient id="extractGrad" x1="0" y1="0" x2="260" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="transformGrad" x1="0" y1="0" x2="260" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="loadGrad" x1="0" y1="0" x2="260" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B45309"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="exploitGrad" x1="0" y1="0" x2="260" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <text x="700" y="70" text-anchor="middle" fill="#0F172A" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Processus ETL des Donnees ITSM
  </text>
  <text x="700" y="108" text-anchor="middle" fill="#475569" font-size="18" font-family="Segoe UI, Arial, sans-serif">
    Integration des fichiers Excel vers la base de donnees et les tableaux de bord
  </text>

  <g filter="url(#shadow)">
    <rect x="110" y="190" rx="30" ry="30" width="240" height="140" fill="#FFFFFF"/>
    <rect x="110" y="190" rx="30" ry="30" width="240" height="140" stroke="#CBD5E1" stroke-width="2"/>
    <text x="230" y="235" text-anchor="middle" fill="#0F172A" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      Sources
    </text>
    <text x="230" y="270" text-anchor="middle" fill="#334155" font-size="17" font-family="Segoe UI, Arial, sans-serif">
      Fichiers Excel
    </text>
    <text x="230" y="298" text-anchor="middle" fill="#64748B" font-size="16" font-family="Segoe UI, Arial, sans-serif">
      Incidents / Requests
    </text>
    <text x="230" y="323" text-anchor="middle" fill="#64748B" font-size="16" font-family="Segoe UI, Arial, sans-serif">
      / Changes (.xlsx)
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="410" y="185" rx="34" ry="34" width="260" height="150" fill="url(#extractGrad)"/>
    <text x="540" y="235" text-anchor="middle" fill="#FFFFFF" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      Extract
    </text>
    <text x="540" y="275" text-anchor="middle" fill="#DBEAFE" font-size="17" font-family="Segoe UI, Arial, sans-serif">
      Lecture du fichier Excel
    </text>
    <text x="540" y="302" text-anchor="middle" fill="#DBEAFE" font-size="17" font-family="Segoe UI, Arial, sans-serif">
      Choix de la feuille
    </text>
    <text x="540" y="329" text-anchor="middle" fill="#DBEAFE" font-size="17" font-family="Segoe UI, Arial, sans-serif">
      Conversion en lignes
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="735" y="185" rx="34" ry="34" width="260" height="150" fill="url(#transformGrad)"/>
    <text x="865" y="235" text-anchor="middle" fill="#FFFFFF" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      Transform
    </text>
    <text x="865" y="272" text-anchor="middle" fill="#CCFBF1" font-size="16" font-family="Segoe UI, Arial, sans-serif">
      Nettoyage et normalisation
    </text>
    <text x="865" y="298" text-anchor="middle" fill="#CCFBF1" font-size="16" font-family="Segoe UI, Arial, sans-serif">
      Conversion types / booleens
    </text>
    <text x="865" y="324" text-anchor="middle" fill="#CCFBF1" font-size="16" font-family="Segoe UI, Arial, sans-serif">
      Verification des doublons
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1060" y="185" rx="34" ry="34" width="260" height="150" fill="url(#loadGrad)"/>
    <text x="1190" y="235" text-anchor="middle" fill="#FFFFFF" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      Load
    </text>
    <text x="1190" y="272" text-anchor="middle" fill="#FEF3C7" font-size="16" font-family="Segoe UI, Arial, sans-serif">
      Ajout des nouvelles donnees
    </text>
    <text x="1190" y="298" text-anchor="middle" fill="#FEF3C7" font-size="16" font-family="Segoe UI, Arial, sans-serif">
      Conservation des anciennes
    </text>
    <text x="1190" y="324" text-anchor="middle" fill="#FEF3C7" font-size="16" font-family="Segoe UI, Arial, sans-serif">
      Insertion en base Django
    </text>
  </g>

  <line x1="350" y1="260" x2="405" y2="260" stroke="#64748B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="670" y1="260" x2="730" y2="260" stroke="#64748B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="995" y1="260" x2="1055" y2="260" stroke="#64748B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="250" y="455" rx="28" ry="28" width="410" height="220" fill="#FFFFFF"/>
    <rect x="250" y="455" rx="28" ry="28" width="410" height="220" stroke="#CBD5E1" stroke-width="2"/>
    <text x="455" y="505" text-anchor="middle" fill="#0F172A" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      Base de Donnees
    </text>
    <rect x="300" y="540" rx="18" ry="18" width="95" height="48" fill="#DBEAFE"/>
    <rect x="415" y="540" rx="18" ry="18" width="95" height="48" fill="#DCFCE7"/>
    <rect x="530" y="540" rx="18" ry="18" width="95" height="48" fill="#FEF3C7"/>
    <text x="347" y="570" text-anchor="middle" fill="#1E3A8A" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      Incident
    </text>
    <text x="462" y="570" text-anchor="middle" fill="#166534" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      Request
    </text>
    <text x="577" y="570" text-anchor="middle" fill="#92400E" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      Change
    </text>
    <text x="455" y="626" text-anchor="middle" fill="#475569" font-size="17" font-family="Segoe UI, Arial, sans-serif">
      Stockage centralise des donnees ITSM
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="455" rx="28" ry="28" width="410" height="220" fill="url(#exploitGrad)"/>
    <text x="975" y="505" text-anchor="middle" fill="#FFFFFF" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
      Exploitation
    </text>
    <rect x="815" y="538" rx="18" ry="18" width="320" height="38" fill="rgba(255,255,255,0.16)"/>
    <rect x="815" y="590" rx="18" ry="18" width="320" height="38" fill="rgba(255,255,255,0.16)"/>
    <text x="975" y="563" text-anchor="middle" fill="#F3E8FF" font-size="17" font-family="Segoe UI, Arial, sans-serif">
      Tableaux et fiches detaillees
    </text>
    <text x="975" y="615" text-anchor="middle" fill="#F3E8FF" font-size="17" font-family="Segoe UI, Arial, sans-serif">
      Statistiques mensuelles et dashboards
    </text>
  </g>

  <line x1="1190" y1="340" x2="1190" y2="400" stroke="#64748B" stroke-width="5" stroke-linecap="round"/>
  <line x1="1190" y1="400" x2="455" y2="400" stroke="#64748B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="660" y1="565" x2="760" y2="565" stroke="#64748B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="975" y="740" text-anchor="middle" fill="#64748B" font-size="15" font-family="Segoe UI, Arial, sans-serif">
    ETL : Extract -> Transform -> Load
  </text>
</svg>
