services:
  frontend:
    build: .
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  backend:
    build: ./backend
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8001:8000"
    environment:
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,backend,192.168.0.108
    volumes:
      - ./backend:/app
    restart: unless-stopped
