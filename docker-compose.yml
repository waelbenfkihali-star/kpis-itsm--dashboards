services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5433}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-itsm_dashboard}
      - POSTGRES_USER=${POSTGRES_USER:-itsm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-itsm_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-itsm_user} -d ${POSTGRES_DB:-itsm_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build: .
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  backend:
    build: ./backend
    working_dir: /app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,backend,192.168.0.108
      - DB_ENGINE=${DB_ENGINE:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-itsm_dashboard}
      - POSTGRES_USER=${POSTGRES_USER:-itsm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-itsm_password}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - AI_DASHBOARD_PROVIDER=${AI_DASHBOARD_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_DASHBOARD_MODEL=${OPENAI_DASHBOARD_MODEL:-gpt-5}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-false}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-LEONI IT <no-reply@leoni.local>}
      - ACCOUNT_EMAIL_BRAND=${ACCOUNT_EMAIL_BRAND:-LEONI IT}
      - APP_LOGIN_URL=${APP_LOGIN_URL:-http://localhost:5173/login}
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  postgres_data:
