services:
  frontend:
    build: .
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  backend:
    build: ./backend
    working_dir: /app
    command: sh -c "django-admin startproject config . && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped