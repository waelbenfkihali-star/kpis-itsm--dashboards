<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef7f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1d3557" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#315f9f"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #16324f; }
      .subtitle { font: 400 22px Arial, sans-serif; fill: #52677a; }
      .fact { fill: #fff4df; stroke: #d88716; stroke-width: 3; }
      .dim { fill: #ffffff; stroke: #1f6feb; stroke-width: 3; }
      .name { font: 700 22px Arial, sans-serif; fill: #16324f; }
      .field { font: 400 17px Arial, sans-serif; fill: #334e68; }
      .note { font: 400 18px Arial, sans-serif; fill: #52677a; }
      .link { stroke: #315f9f; stroke-width: 3; fill: none; marker-end: url(#arrow); opacity: 0.75; }
      .hub { fill: #e8f1ff; stroke: #315f9f; stroke-width: 2; }
      .hubText { font: 700 16px Arial, sans-serif; fill: #315f9f; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <text x="800" y="58" text-anchor="middle" class="title">Schéma global multidimensionnel de l'application</text>
  <text x="800" y="96" text-anchor="middle" class="subtitle">Modèle en constellation : trois tables de faits et des dimensions communes</text>

  <!-- Top dimensions -->
  <g filter="url(#shadow)">
    <rect x="250" y="145" width="300" height="140" rx="8" class="dim"/>
    <text x="400" y="184" text-anchor="middle" class="name">DIM_Temps</text>
    <text x="400" y="218" text-anchor="middle" class="field">id_temps</text>
    <text x="400" y="246" text-anchor="middle" class="field">jour, mois, trimestre</text>
    <text x="400" y="274" text-anchor="middle" class="field">année</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="145" width="300" height="140" rx="8" class="dim"/>
    <text x="800" y="184" text-anchor="middle" class="name">DIM_Statut</text>
    <text x="800" y="218" text-anchor="middle" class="field">id_statut</text>
    <text x="800" y="246" text-anchor="middle" class="field">ouvert, en cours</text>
    <text x="800" y="274" text-anchor="middle" class="field">résolu, fermé</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1050" y="145" width="300" height="140" rx="8" class="dim"/>
    <text x="1200" y="184" text-anchor="middle" class="name">DIM_Priorité</text>
    <text x="1200" y="218" text-anchor="middle" class="field">id_priorite</text>
    <text x="1200" y="246" text-anchor="middle" class="field">faible, moyenne</text>
    <text x="1200" y="274" text-anchor="middle" class="field">haute, critique</text>
  </g>

  <!-- Relation hub top -->
  <circle cx="800" cy="345" r="26" class="hub"/>
  <text x="800" y="351" text-anchor="middle" class="hubText">FK</text>

  <!-- Facts -->
  <g filter="url(#shadow)">
    <rect x="125" y="420" width="360" height="245" rx="8" class="fact"/>
    <text x="305" y="462" text-anchor="middle" class="name">FACT_Incidents</text>
    <line x1="155" y1="480" x2="455" y2="480" stroke="#d88716" stroke-width="2"/>
    <text x="305" y="515" text-anchor="middle" class="field">id_temps, id_statut</text>
    <text x="305" y="545" text-anchor="middle" class="field">id_priorite, id_categorie</text>
    <text x="305" y="575" text-anchor="middle" class="field">id_service</text>
    <text x="305" y="615" text-anchor="middle" class="field">nb_incidents</text>
    <text x="305" y="645" text-anchor="middle" class="field">delai_resolution</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="420" width="360" height="245" rx="8" class="fact"/>
    <text x="800" y="462" text-anchor="middle" class="name">FACT_Requests</text>
    <line x1="650" y1="480" x2="950" y2="480" stroke="#d88716" stroke-width="2"/>
    <text x="800" y="515" text-anchor="middle" class="field">id_temps, id_statut</text>
    <text x="800" y="545" text-anchor="middle" class="field">id_priorite, id_categorie</text>
    <text x="800" y="575" text-anchor="middle" class="field">id_service</text>
    <text x="800" y="615" text-anchor="middle" class="field">nb_requests</text>
    <text x="800" y="645" text-anchor="middle" class="field">delai_traitement</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1115" y="420" width="360" height="245" rx="8" class="fact"/>
    <text x="1295" y="462" text-anchor="middle" class="name">FACT_Changes</text>
    <line x1="1145" y1="480" x2="1445" y2="480" stroke="#d88716" stroke-width="2"/>
    <text x="1295" y="515" text-anchor="middle" class="field">id_temps, id_statut</text>
    <text x="1295" y="545" text-anchor="middle" class="field">id_priorite, id_categorie</text>
    <text x="1295" y="575" text-anchor="middle" class="field">id_service</text>
    <text x="1295" y="615" text-anchor="middle" class="field">nb_changes</text>
    <text x="1295" y="645" text-anchor="middle" class="field">delai_validation</text>
  </g>

  <!-- Bottom dimensions -->
  <g filter="url(#shadow)">
    <rect x="450" y="765" width="300" height="140" rx="8" class="dim"/>
    <text x="600" y="804" text-anchor="middle" class="name">DIM_Catégorie</text>
    <text x="600" y="838" text-anchor="middle" class="field">id_categorie</text>
    <text x="600" y="866" text-anchor="middle" class="field">logiciel, matériel</text>
    <text x="600" y="894" text-anchor="middle" class="field">réseau, sécurité</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="765" width="300" height="140" rx="8" class="dim"/>
    <text x="1000" y="804" text-anchor="middle" class="name">DIM_Service</text>
    <text x="1000" y="838" text-anchor="middle" class="field">id_service</text>
    <text x="1000" y="866" text-anchor="middle" class="field">IT, support</text>
    <text x="1000" y="894" text-anchor="middle" class="field">réseau, système</text>
  </g>

  <!-- Relation hub bottom -->
  <circle cx="800" cy="720" r="26" class="hub"/>
  <text x="800" y="726" text-anchor="middle" class="hubText">FK</text>

  <!-- Links: top dimensions to top hub -->
  <path class="link" d="M400 285 L745 335"/>
  <path class="link" d="M800 285 L800 318"/>
  <path class="link" d="M1200 285 L855 335"/>

  <!-- Links: top hub to facts -->
  <path class="link" d="M780 365 L305 420"/>
  <path class="link" d="M800 371 L800 420"/>
  <path class="link" d="M820 365 L1295 420"/>

  <!-- Links: bottom dimensions to bottom hub -->
  <path class="link" d="M600 765 L760 735"/>
  <path class="link" d="M1000 765 L840 735"/>

  <!-- Links: bottom hub to facts -->
  <path class="link" d="M780 700 L305 665"/>
  <path class="link" d="M800 694 L800 665"/>
  <path class="link" d="M820 700 L1295 665"/>

  <!-- Explanatory labels -->
  <text x="80" y="930" class="note">Tables de faits : contiennent les clés étrangères et les mesures KPI.</text>
  <text x="80" y="958" class="note">Tables de dimensions : décrivent les axes d'analyse utilisés par les trois modules.</text>
</svg>
