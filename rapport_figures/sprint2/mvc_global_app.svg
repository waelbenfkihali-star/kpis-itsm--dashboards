<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef7f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1d3557" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#315f9f"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #16324f; }
      .subtitle { font: 400 21px Arial, sans-serif; fill: #52677a; }
      .panel-title { font: 700 28px Arial, sans-serif; fill: #16324f; }
      .panel-text { font: 400 18px Arial, sans-serif; fill: #334e68; }
      .caption { font: 400 18px Arial, sans-serif; fill: #52677a; }
      .viewBox { fill: #ffffff; stroke: #3478f6; stroke-width: 3; }
      .controllerBox { fill: #ffffff; stroke: #24c38f; stroke-width: 3; }
      .modelBox { fill: #ffffff; stroke: #f59e0b; stroke-width: 3; }
      .flow { stroke: #315f9f; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .smallBox { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .smallTitle { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .smallText { font: 400 16px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="58" text-anchor="middle" class="title">Architecture MVC globale de l'application</text>
  <text x="800" y="92" text-anchor="middle" class="subtitle">Organisation des composants React, logique de contrôle et données ITSM</text>

  <!-- View -->
  <g filter="url(#shadow)">
    <rect x="90" y="150" width="400" height="600" rx="12" class="viewBox"/>
    <text x="290" y="198" text-anchor="middle" class="panel-title">Vue (View)</text>
    <text x="290" y="235" text-anchor="middle" class="panel-text">Interfaces utilisateur React</text>

    <rect x="125" y="275" width="330" height="78" rx="8" class="smallBox"/>
    <text x="290" y="306" text-anchor="middle" class="smallTitle">Authentification</text>
    <text x="290" y="334" text-anchor="middle" class="smallText">Login.jsx</text>

    <rect x="125" y="375" width="330" height="78" rx="8" class="smallBox"/>
    <text x="290" y="406" text-anchor="middle" class="smallTitle">Pages ITSM</text>
    <text x="290" y="434" text-anchor="middle" class="smallText">Incidents.jsx, Requests.jsx, Changes.jsx</text>

    <rect x="125" y="475" width="330" height="78" rx="8" class="smallBox"/>
    <text x="290" y="506" text-anchor="middle" class="smallTitle">Business Intelligence</text>
    <text x="290" y="534" text-anchor="middle" class="smallText">Dashboard.jsx, KPI, analyses, AssistantDashboard.jsx</text>

    <rect x="125" y="575" width="330" height="78" rx="8" class="smallBox"/>
    <text x="290" y="606" text-anchor="middle" class="smallTitle">Importation</text>
    <text x="290" y="634" text-anchor="middle" class="smallText">ImportExcel.jsx</text>
  </g>

  <!-- Controller -->
  <g filter="url(#shadow)">
    <rect x="600" y="150" width="400" height="600" rx="12" class="controllerBox"/>
    <text x="800" y="198" text-anchor="middle" class="panel-title">Contrôleur (Controller)</text>
    <text x="800" y="235" text-anchor="middle" class="panel-text">Gestion de la logique applicative et des requêtes</text>

    <rect x="635" y="275" width="330" height="78" rx="8" class="smallBox"/>
    <text x="800" y="306" text-anchor="middle" class="smallTitle">Routes et accès</text>
    <text x="800" y="334" text-anchor="middle" class="smallText">ProtectedRoute.jsx, RoleRoute.jsx</text>

    <rect x="635" y="375" width="330" height="78" rx="8" class="smallBox"/>
    <text x="800" y="406" text-anchor="middle" class="smallTitle">API Frontend</text>
    <text x="800" y="434" text-anchor="middle" class="smallText">api.js, appels fetch, gestion JWT</text>

    <rect x="635" y="475" width="330" height="78" rx="8" class="smallBox"/>
    <text x="800" y="506" text-anchor="middle" class="smallTitle">Backend Django</text>
    <text x="800" y="534" text-anchor="middle" class="smallText">Views, serializers, logique de traitement</text>

    <rect x="635" y="575" width="330" height="78" rx="8" class="smallBox"/>
    <text x="800" y="606" text-anchor="middle" class="smallTitle">Traitement BI</text>
    <text x="800" y="634" text-anchor="middle" class="smallText">KPI, filtres, analyses, export PDF</text>
  </g>

  <!-- Model -->
  <g filter="url(#shadow)">
    <rect x="1110" y="150" width="400" height="600" rx="12" class="modelBox"/>
    <text x="1310" y="198" text-anchor="middle" class="panel-title">Modèle (Model)</text>
    <text x="1310" y="235" text-anchor="middle" class="panel-text">Données métier et stockage</text>

    <rect x="1145" y="275" width="330" height="78" rx="8" class="smallBox"/>
    <text x="1310" y="306" text-anchor="middle" class="smallTitle">Données ITSM</text>
    <text x="1310" y="334" text-anchor="middle" class="smallText">Incident, Request, Change</text>

    <rect x="1145" y="375" width="330" height="78" rx="8" class="smallBox"/>
    <text x="1310" y="406" text-anchor="middle" class="smallTitle">Utilisateurs et rôles</text>
    <text x="1310" y="434" text-anchor="middle" class="smallText">User, profils, accès administrateur</text>

    <rect x="1145" y="475" width="330" height="78" rx="8" class="smallBox"/>
    <text x="1310" y="506" text-anchor="middle" class="smallTitle">Indicateurs</text>
    <text x="1310" y="534" text-anchor="middle" class="smallText">KPI définis, catalogue KPI, formules</text>

    <rect x="1145" y="575" width="330" height="78" rx="8" class="smallBox"/>
    <text x="1310" y="606" text-anchor="middle" class="smallTitle">Sources de données</text>
    <text x="1310" y="634" text-anchor="middle" class="smallText">Fichiers Excel, base de données, résultats BI</text>
  </g>

  <!-- Arrows -->
  <path class="flow" d="M490 450 L590 450"/>
  <path class="flow" d="M1000 450 L1100 450"/>
  <path class="flow" d="M1110 700 C980 810, 620 810, 490 700"/>

  <!-- Labels -->
  <text x="540" y="430" text-anchor="middle" class="caption">Actions utilisateur</text>
  <text x="1050" y="430" text-anchor="middle" class="caption">Requêtes et traitements</text>
  <text x="800" y="830" text-anchor="middle" class="caption">Résultats, données et informations affichées</text>
</svg>
