<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1100" viewBox="0 0 1700 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfcff"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1d3557" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#315f9f"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #16324f; }
      .subtitle { font: 400 22px Arial, sans-serif; fill: #52677a; }
      .fact { fill: #fff4df; stroke: #d88716; stroke-width: 3; }
      .dim { fill: #ffffff; stroke: #1f6feb; stroke-width: 3; }
      .subdim { fill: #eef7f3; stroke: #0e8a6a; stroke-width: 3; }
      .name { font: 700 22px Arial, sans-serif; fill: #16324f; }
      .field { font: 400 16px Arial, sans-serif; fill: #334e68; }
      .note { font: 400 18px Arial, sans-serif; fill: #52677a; }
      .link { stroke: #315f9f; stroke-width: 3; fill: none; marker-end: url(#arrow); opacity: 0.78; }
      .subLink { stroke: #0e8a6a; stroke-width: 3; fill: none; marker-end: url(#arrow); opacity: 0.82; }
    </style>
  </defs>

  <rect width="1700" height="1100" fill="url(#bg)"/>

  <text x="850" y="58" text-anchor="middle" class="title">Schéma global en flocon de neige de l'application</text>
  <text x="850" y="96" text-anchor="middle" class="subtitle">Les dimensions principales sont normalisées en sous-dimensions</text>

  <!-- Sub-dimensions top -->
  <g filter="url(#shadow)">
    <rect x="95" y="145" width="255" height="105" rx="8" class="subdim"/>
    <text x="222" y="184" text-anchor="middle" class="name">DIM_Calendrier</text>
    <text x="222" y="216" text-anchor="middle" class="field">mois, trimestre, année</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1320" y="145" width="255" height="105" rx="8" class="subdim"/>
    <text x="1447" y="184" text-anchor="middle" class="name">DIM_Niveau</text>
    <text x="1447" y="216" text-anchor="middle" class="field">faible, moyen, élevé</text>
  </g>

  <!-- Main dimensions top -->
  <g filter="url(#shadow)">
    <rect x="430" y="145" width="285" height="130" rx="8" class="dim"/>
    <text x="572" y="184" text-anchor="middle" class="name">DIM_Temps</text>
    <text x="572" y="218" text-anchor="middle" class="field">id_temps, date</text>
    <text x="572" y="246" text-anchor="middle" class="field">id_calendrier</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="985" y="145" width="285" height="130" rx="8" class="dim"/>
    <text x="1127" y="184" text-anchor="middle" class="name">DIM_Priorité</text>
    <text x="1127" y="218" text-anchor="middle" class="field">id_priorite</text>
    <text x="1127" y="246" text-anchor="middle" class="field">nom_priorite, id_niveau</text>
  </g>

  <!-- Facts -->
  <g filter="url(#shadow)">
    <rect x="130" y="430" width="360" height="245" rx="8" class="fact"/>
    <text x="310" y="472" text-anchor="middle" class="name">FACT_Incidents</text>
    <line x1="160" y1="490" x2="460" y2="490" stroke="#d88716" stroke-width="2"/>
    <text x="310" y="525" text-anchor="middle" class="field">id_temps, id_statut</text>
    <text x="310" y="555" text-anchor="middle" class="field">id_priorite, id_categorie</text>
    <text x="310" y="585" text-anchor="middle" class="field">id_service</text>
    <text x="310" y="625" text-anchor="middle" class="field">nb_incidents</text>
    <text x="310" y="655" text-anchor="middle" class="field">delai_resolution</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="670" y="430" width="360" height="245" rx="8" class="fact"/>
    <text x="850" y="472" text-anchor="middle" class="name">FACT_Requests</text>
    <line x1="700" y1="490" x2="1000" y2="490" stroke="#d88716" stroke-width="2"/>
    <text x="850" y="525" text-anchor="middle" class="field">id_temps, id_statut</text>
    <text x="850" y="555" text-anchor="middle" class="field">id_priorite, id_categorie</text>
    <text x="850" y="585" text-anchor="middle" class="field">id_service</text>
    <text x="850" y="625" text-anchor="middle" class="field">nb_requests</text>
    <text x="850" y="655" text-anchor="middle" class="field">delai_traitement</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1210" y="430" width="360" height="245" rx="8" class="fact"/>
    <text x="1390" y="472" text-anchor="middle" class="name">FACT_Changes</text>
    <line x1="1240" y1="490" x2="1540" y2="490" stroke="#d88716" stroke-width="2"/>
    <text x="1390" y="525" text-anchor="middle" class="field">id_temps, id_statut</text>
    <text x="1390" y="555" text-anchor="middle" class="field">id_priorite, id_categorie</text>
    <text x="1390" y="585" text-anchor="middle" class="field">id_service</text>
    <text x="1390" y="625" text-anchor="middle" class="field">nb_changes</text>
    <text x="1390" y="655" text-anchor="middle" class="field">delai_validation</text>
  </g>

  <!-- Bottom main dimensions -->
  <g filter="url(#shadow)">
    <rect x="260" y="805" width="285" height="130" rx="8" class="dim"/>
    <text x="402" y="844" text-anchor="middle" class="name">DIM_Statut</text>
    <text x="402" y="878" text-anchor="middle" class="field">id_statut</text>
    <text x="402" y="906" text-anchor="middle" class="field">nom_statut, id_etat</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="710" y="805" width="285" height="130" rx="8" class="dim"/>
    <text x="852" y="844" text-anchor="middle" class="name">DIM_Catégorie</text>
    <text x="852" y="878" text-anchor="middle" class="field">id_categorie</text>
    <text x="852" y="906" text-anchor="middle" class="field">nom, id_type_categorie</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1155" y="805" width="285" height="130" rx="8" class="dim"/>
    <text x="1297" y="844" text-anchor="middle" class="name">DIM_Service</text>
    <text x="1297" y="878" text-anchor="middle" class="field">id_service</text>
    <text x="1297" y="906" text-anchor="middle" class="field">nom_service, id_groupe</text>
  </g>

  <!-- Bottom sub-dimensions -->
  <g filter="url(#shadow)">
    <rect x="45" y="830" width="170" height="90" rx="8" class="subdim"/>
    <text x="130" y="866" text-anchor="middle" class="name">DIM_État</text>
    <text x="130" y="895" text-anchor="middle" class="field">état détaillé</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="965" width="245" height="90" rx="8" class="subdim"/>
    <text x="682" y="1001" text-anchor="middle" class="name">DIM_Type</text>
    <text x="682" y="1030" text-anchor="middle" class="field">logiciel, réseau...</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="965" width="245" height="90" rx="8" class="subdim"/>
    <text x="1232" y="1001" text-anchor="middle" class="name">DIM_Groupe</text>
    <text x="1232" y="1030" text-anchor="middle" class="field">support, système...</text>
  </g>

  <!-- Links sub dimensions to main dimensions -->
  <path class="subLink" d="M350 198 L430 205"/>
  <path class="subLink" d="M1270 205 L1320 198"/>
  <path class="subLink" d="M215 875 L260 875"/>
  <path class="subLink" d="M730 965 L800 935"/>
  <path class="subLink" d="M1245 965 L1275 935"/>

  <!-- Main dimension to facts links -->
  <path class="link" d="M572 275 C480 335, 360 365, 310 430"/>
  <path class="link" d="M572 275 C650 345, 790 355, 850 430"/>
  <path class="link" d="M572 275 C850 340, 1240 360, 1390 430"/>

  <path class="link" d="M1127 275 C1010 335, 910 365, 850 430"/>
  <path class="link" d="M1127 275 C1225 335, 1340 365, 1390 430"/>
  <path class="link" d="M1127 275 C800 340, 430 360, 310 430"/>

  <path class="link" d="M402 805 C370 750, 330 710, 310 675"/>
  <path class="link" d="M402 805 C520 740, 730 705, 850 675"/>
  <path class="link" d="M402 805 C720 745, 1190 720, 1390 675"/>

  <path class="link" d="M852 805 C720 735, 480 700, 310 675"/>
  <path class="link" d="M852 805 C850 750, 850 710, 850 675"/>
  <path class="link" d="M852 805 C990 735, 1215 700, 1390 675"/>

  <path class="link" d="M1297 805 C1060 735, 520 705, 310 675"/>
  <path class="link" d="M1297 805 C1140 745, 990 710, 850 675"/>
  <path class="link" d="M1297 805 C1320 750, 1365 710, 1390 675"/>

  <!-- Legend -->
  <rect x="70" y="55" width="24" height="24" rx="3" fill="#fff4df" stroke="#d88716" stroke-width="3"/>
  <text x="105" y="74" class="note">Table de faits</text>
  <rect x="230" y="55" width="24" height="24" rx="3" fill="#ffffff" stroke="#1f6feb" stroke-width="3"/>
  <text x="265" y="74" class="note">Dimension principale</text>
  <rect x="470" y="55" width="24" height="24" rx="3" fill="#eef7f3" stroke="#0e8a6a" stroke-width="3"/>
  <text x="505" y="74" class="note">Sous-dimension</text>
</svg>
