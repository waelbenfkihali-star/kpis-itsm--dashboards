<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9fbff"/>
      <stop offset="100%" stop-color="#eff8f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1d3557" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#315f9f"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #16324f; }
      .subtitle { font: 400 22px Arial, sans-serif; fill: #52677a; }
      .fact { fill: #fff4df; stroke: #d88716; stroke-width: 3; }
      .dim { fill: #ffffff; stroke: #1f6feb; stroke-width: 3; }
      .name { font: 700 22px Arial, sans-serif; fill: #16324f; }
      .field { font: 400 16px Arial, sans-serif; fill: #334e68; }
      .note { font: 400 18px Arial, sans-serif; fill: #52677a; }
      .link { stroke: #315f9f; stroke-width: 3; fill: none; marker-end: url(#arrow); opacity: 0.78; }
      .hub { fill: #e8f1ff; stroke: #315f9f; stroke-width: 2; }
      .hubText { font: 700 15px Arial, sans-serif; fill: #315f9f; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="800" y="58" text-anchor="middle" class="title">Schéma en constellation de l'application</text>
  <text x="800" y="96" text-anchor="middle" class="subtitle">Plusieurs tables de faits partagent des dimensions communes</text>

  <!-- Dimensions -->
  <g filter="url(#shadow)">
    <rect x="120" y="170" width="265" height="125" rx="8" class="dim"/>
    <text x="252" y="208" text-anchor="middle" class="name">DIM_Temps</text>
    <text x="252" y="242" text-anchor="middle" class="field">id_temps, date</text>
    <text x="252" y="270" text-anchor="middle" class="field">jour, mois, année</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="485" y="170" width="265" height="125" rx="8" class="dim"/>
    <text x="617" y="208" text-anchor="middle" class="name">DIM_Statut</text>
    <text x="617" y="242" text-anchor="middle" class="field">id_statut</text>
    <text x="617" y="270" text-anchor="middle" class="field">ouvert, en cours, fermé</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="170" width="265" height="125" rx="8" class="dim"/>
    <text x="982" y="208" text-anchor="middle" class="name">DIM_Priorité</text>
    <text x="982" y="242" text-anchor="middle" class="field">id_priorite</text>
    <text x="982" y="270" text-anchor="middle" class="field">faible, moyenne, haute</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1215" y="170" width="265" height="125" rx="8" class="dim"/>
    <text x="1347" y="208" text-anchor="middle" class="name">DIM_Service</text>
    <text x="1347" y="242" text-anchor="middle" class="field">id_service</text>
    <text x="1347" y="270" text-anchor="middle" class="field">IT, support, réseau</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="668" y="760" width="265" height="125" rx="8" class="dim"/>
    <text x="800" y="798" text-anchor="middle" class="name">DIM_Catégorie</text>
    <text x="800" y="832" text-anchor="middle" class="field">id_categorie</text>
    <text x="800" y="860" text-anchor="middle" class="field">logiciel, matériel, réseau</text>
  </g>

  <!-- Facts -->
  <g filter="url(#shadow)">
    <rect x="165" y="430" width="350" height="220" rx="8" class="fact"/>
    <text x="340" y="472" text-anchor="middle" class="name">FACT_Incidents</text>
    <line x1="195" y1="490" x2="485" y2="490" stroke="#d88716" stroke-width="2"/>
    <text x="340" y="525" text-anchor="middle" class="field">id_temps, id_statut</text>
    <text x="340" y="555" text-anchor="middle" class="field">id_priorite, id_categorie</text>
    <text x="340" y="585" text-anchor="middle" class="field">id_service</text>
    <text x="340" y="625" text-anchor="middle" class="field">nb_incidents, delai_resolution</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="625" y="430" width="350" height="220" rx="8" class="fact"/>
    <text x="800" y="472" text-anchor="middle" class="name">FACT_Requests</text>
    <line x1="655" y1="490" x2="945" y2="490" stroke="#d88716" stroke-width="2"/>
    <text x="800" y="525" text-anchor="middle" class="field">id_temps, id_statut</text>
    <text x="800" y="555" text-anchor="middle" class="field">id_priorite, id_categorie</text>
    <text x="800" y="585" text-anchor="middle" class="field">id_service</text>
    <text x="800" y="625" text-anchor="middle" class="field">nb_requests, delai_traitement</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1085" y="430" width="350" height="220" rx="8" class="fact"/>
    <text x="1260" y="472" text-anchor="middle" class="name">FACT_Changes</text>
    <line x1="1115" y1="490" x2="1405" y2="490" stroke="#d88716" stroke-width="2"/>
    <text x="1260" y="525" text-anchor="middle" class="field">id_temps, id_statut</text>
    <text x="1260" y="555" text-anchor="middle" class="field">id_priorite, id_categorie</text>
    <text x="1260" y="585" text-anchor="middle" class="field">id_service</text>
    <text x="1260" y="625" text-anchor="middle" class="field">nb_changes, delai_validation</text>
  </g>

  <!-- Hubs for cleaner connections -->
  <circle cx="800" cy="355" r="24" class="hub"/>
  <text x="800" y="361" text-anchor="middle" class="hubText">Dims</text>
  <circle cx="800" cy="710" r="24" class="hub"/>
  <text x="800" y="716" text-anchor="middle" class="hubText">Cat</text>

  <!-- Top dimensions to hub -->
  <path class="link" d="M252 295 L760 345"/>
  <path class="link" d="M617 295 L785 335"/>
  <path class="link" d="M982 295 L815 335"/>
  <path class="link" d="M1347 295 L840 345"/>

  <!-- Hub to facts -->
  <path class="link" d="M780 375 L340 430"/>
  <path class="link" d="M800 379 L800 430"/>
  <path class="link" d="M820 375 L1260 430"/>

  <!-- Category to facts -->
  <path class="link" d="M800 760 L800 735"/>
  <path class="link" d="M780 690 L340 650"/>
  <path class="link" d="M800 686 L800 650"/>
  <path class="link" d="M820 690 L1260 650"/>

  <!-- Legend -->
  <rect x="115" y="925" width="24" height="24" rx="3" fill="#fff4df" stroke="#d88716" stroke-width="3"/>
  <text x="150" y="944" class="note">Tables de faits</text>
  <rect x="300" y="925" width="24" height="24" rx="3" fill="#ffffff" stroke="#1f6feb" stroke-width="3"/>
  <text x="335" y="944" class="note">Dimensions communes</text>
</svg>
